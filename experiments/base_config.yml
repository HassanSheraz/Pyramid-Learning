# base_config.yml
# Shared defaults — all strategy-specific configs inherit these values.

# Dataset
dataset: cifar10
data_dir: data/
num_classes: 10

# Non-IID settings
num_clients: 100
alpha: 0.5          # Dirichlet concentration (0.5 = moderate non-IID)

# FL training
num_rounds: 100
clients_per_round: 10
local_epochs: 5
batch_size: 32
learning_rate: 0.01
momentum: 0.9
weight_decay: 0.0001

# Model
model: simple_cnn   # defined in src/client_model.py

# Reproducibility
seed: 42

# Output
out_dir: reports/
